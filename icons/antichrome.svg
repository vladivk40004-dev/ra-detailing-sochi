<svg width="163" height="120" viewBox="0 0 163 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Антихром — машина с хромированными элементами, перечёркнутыми/закрашенными -->
<!-- Кузов -->
<path d="M25 80 L25 65 Q25 58, 35 55 L55 48 Q62 42, 75 40 L95 40 Q108 42, 115 48 L135 55 Q145 58, 145 65 L145 80" stroke="#858585" stroke-width="2.5" fill="none"/>
<!-- Крыша -->
<path d="M55 48 Q62 35, 80 33 Q98 35, 105 42 L115 48" stroke="#858585" stroke-width="2.5" fill="none"/>
<!-- Окна -->
<path d="M60 47 L72 36 Q80 34, 88 36 L100 44" stroke="#858585" stroke-width="1.5" fill="none"/>
<!-- Хромированная решётка (зачёркнута красным) -->
<rect x="25" y="62" width="20" height="10" rx="2" fill="none" stroke="#858585" stroke-width="2"/>
<line x1="27" y1="65" x2="43" y2="65" stroke="#858585" stroke-width="1"/>
<line x1="27" y1="68" x2="43" y2="68" stroke="#858585" stroke-width="1"/>
<!-- Красный X на решётке -->
<line x1="26" y1="61" x2="46" y2="73" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
<line x1="46" y1="61" x2="26" y2="73" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
<!-- Хромированные молдинги на кузове -->
<line x1="35" y1="56" x2="130" y2="56" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round"/>
<!-- Красная обёртка поверх молдинга (покрытие) -->
<line x1="50" y1="56" x2="110" y2="56" stroke="#e11d48" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
<!-- Хромированные ручки дверей -->
<rect x="65" y="52" width="10" height="3" rx="1.5" fill="#c0c0c0"/>
<rect x="90" y="52" width="10" height="3" rx="1.5" fill="#c0c0c0"/>
<!-- Красная обёртка на ручках -->
<rect x="65" y="52" width="10" height="3" rx="1.5" fill="#e11d48" opacity="0.6"/>
<rect x="90" y="52" width="10" height="3" rx="1.5" fill="#e11d48" opacity="0.6"/>
<!-- Колёса -->
<circle cx="50" cy="82" r="11" stroke="#858585" stroke-width="2.5" fill="none"/>
<circle cx="50" cy="82" r="5" fill="#858585"/>
<circle cx="120" cy="82" r="11" stroke="#858585" stroke-width="2.5" fill="none"/>
<circle cx="120" cy="82" r="5" fill="#858585"/>
<!-- Днище -->
<line x1="35" y1="80" x2="40" y2="80" stroke="#858585" stroke-width="2"/>
<line x1="61" y1="80" x2="109" y2="80" stroke="#858585" stroke-width="2"/>
<line x1="131" y1="80" x2="140" y2="80" stroke="#858585" stroke-width="2"/>
<!-- Стрелка "хром → матовый" -->
<text x="55" y="105" font-family="sans-serif" font-size="10" fill="#858585">CHROME</text>
<path d="M100 102 L110 102" stroke="#e11d48" stroke-width="2" marker-end="url(#arr)"/>
<text x="113" y="105" font-family="sans-serif" font-size="10" fill="#e11d48" font-weight="bold">MATTE</text>
</svg>
